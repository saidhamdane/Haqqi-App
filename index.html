<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حقي | Haqqi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a4731; --secondary: #c5a059; --bg: #f8f9fa; }
        body { font-family: system-ui; background: var(--bg); margin: 0; padding: 20px; }
        .header { background: var(--primary); color: white; padding: 30px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; }
        .card i { font-size: 24px; color: var(--secondary); margin-bottom: 10px; }
        .chat-box { background: white; padding: 20px; border-radius: 15px; margin-top: 20px; min-height: 100px; border: 1px solid #eee; }
        .error { color: #dc3545; background: #fff5f5; padding: 10px; border-radius: 8px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="header">
        <i class="fas fa-balance-scale" style="font-size: 40px; color: var(--secondary);"></i>
        <h1>حقي</h1>
        <p>مستشارك القانوني - مدعوم بالذكاء الاصطناعي</p>
    </div>

    <div class="grid">
        <div class="card" onclick="askQuestion('إقامة')"><i class="fas fa-id-card"></i><div>إقامة</div></div>
        <div class="card" onclick="askQuestion('عمل')"><i class="fas fa-briefcase"></i><div>عمل</div></div>
        <div class="card" onclick="askQuestion('إيجار')"><i class="fas fa-home"></i><div>إيجار</div></div>
    </div>

    <div id="error-msg" class="error">❌ خطأ في الاتصال بالسيرفر.</div>
    <div id="response" class="chat-box">اختر قسماً أو اطرح سؤالك...</div>

    <script>
        async function askQuestion(topic) {
            const resBox = document.getElementById('response');
            const errorBox = document.getElementById('error-msg');
            resBox.innerText = 'جاري جلب المعلومات...';
            errorBox.style.display = 'none';

            try {
                // الاتصال بمسار Vercel Serverless Function الجديد
                const response = await fetch('/api/index/ask?question=' + encodeURIComponent(topic));
                if (!response.ok) throw new Error();
                const data = await response.json();
                resBox.innerText = data.answer || data.response;
            } catch (err) {
                errorBox.style.display = 'block';
                resBox.innerText = '';
            }
        }
    </script>
</body>
</html>
