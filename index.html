<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حقي AI | المستشار القانوني العالمي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0a2e1f; --secondary: #b6914d; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .nav { background: var(--primary); color: white; padding: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .nav h1 { margin: 0; font-size: 22px; color: var(--secondary); }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 20px; font-size: 15px; line-height: 1.6; position: relative; animation: fadeIn 0.3s ease; }
        .ai { background: white; align-self: flex-start; border-right: 5px solid var(--secondary); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .user { background: var(--primary); color: white; align-self: flex-end; border-bottom-left-radius: 2px; }
        .copy-btn { font-size: 12px; color: var(--secondary); cursor: pointer; margin-top: 8px; display: inline-block; border: 1px solid var(--secondary); padding: 2px 8px; border-radius: 10px; }
        .input-bar { background: white; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; border: 1px solid #eee; padding: 12px 20px; border-radius: 25px; outline: none; background: #f1f3f4; }
        .send-btn { background: var(--secondary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="nav"><h1>⚖️ حقي AI</h1></div>
    <div id="chat">
        <div class="msg ai">مرحباً بك. أنا "حقي"، مستشارك القانوني العالمي. اسألني عن أي شيء يخص قوانين إسبانيا بالدارجة.</div>
    </div>
    <div class="input-bar">
        <input type="text" id="userInput" placeholder="اكتب سؤالك هنا..." onkeypress="if(event.key==='Enter') send()">
        <button class="send-btn" onclick="send()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <script>
        async function send() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            if(!input.value.trim()) return;

            const text = input.value;
            chat.innerHTML += '<div class="msg user">' + text + '</div>';
            input.value = '';
            chat.scrollTop = chat.scrollHeight;

            try {
                const response = await fetch('/api/index/ask?question=' + encodeURIComponent(text));
                const data = await response.json();
                const answer = data.answer || "عذراً، وقع خطأ.";
                const aiMsg = document.createElement('div');
                aiMsg.className = 'msg ai';
                aiMsg.innerHTML = answer.replace(/\n/g, '<br>') + '<br><span class="copy-btn" onclick="copyText(`'+answer.replace(/'/g, "\'")+'`)"><i class="far fa-copy"></i> نسخ الاستشارة</span>';
                chat.appendChild(aiMsg);
                chat.scrollTop = chat.scrollHeight;
            } catch (err) {
                chat.innerHTML += '<div class="msg ai">عذراً، حاول مرة أخرى.</div>';
            }
        }
        function copyText(text) {
            navigator.clipboard.writeText(text);
            alert("تم نسخ الاستشارة القانونية!");
        }
    </script>
</body>
</html>
