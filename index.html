<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حقي | Haqqi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a4731; --secondary: #c5a059; --bg: #f8f9fa; }
        body { font-family: system-ui; background: var(--bg); margin: 0; padding: 20px; }
        .header { background: var(--primary); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .card { background: white; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #eee; }
        .card i { font-size: 20px; color: var(--secondary); display: block; margin-bottom: 5px; }
        .card span { font-size: 14px; font-weight: bold; color: #333; }
        .chat-box { background: white; padding: 20px; border-radius: 15px; min-height: 150px; border: 1px solid #ddd; position: relative; }
        #response { line-height: 1.6; color: #444; }
        .loading { display: none; color: var(--secondary); font-weight: bold; text-align: center; }
        .error-msg { color: #dc3545; display: none; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <i class="fas fa-balance-scale" style="font-size: 30px; color: var(--secondary);"></i>
        <h2 style="margin: 10px 0 5px;">حقي</h2>
        <p style="margin: 0; font-size: 12px; opacity: 0.8;">مستشارك القانوني بالذكاء الاصطناعي</p>
    </div>

    <div class="grid">
        <div class="card" onclick="askAI('قوانين الإقامة في إسبانيا بالدارجة المغربية')">
            <i class="fas fa-id-card"></i><span>إقامة</span>
        </div>
        <div class="card" onclick="askAI('قوانين العمل في إسبانيا بالدارجة المغربية')">
            <i class="fas fa-briefcase"></i><span>عمل</span>
        </div>
        <div class="card" onclick="askAI('قوانين الإيجار والسكن في إسبانيا بالدارجة')">
            <i class="fas fa-home"></i><span>إيجار</span>
        </div>
    </div>

    <div class="chat-box">
        <div id="loading" class="loading"><i class="fas fa-spinner fa-spin"></i> جاري استشارة المحامي الرقمي...</div>
        <div id="response">مرحباً بك! اختر قسماً أعلاه للحصول على استشارة قانونية فورية بالدارجة.</div>
        <div id="error" class="error-msg">❌ فشل الاتصال. تأكد من إعداد API Key في Vercel.</div>
    </div>

    <script>
        async function askAI(prompt) {
            const resDiv = document.getElementById('response');
            const loader = document.getElementById('loading');
            const errorDiv = document.getElementById('error');
            
            resDiv.style.opacity = '0.3';
            loader.style.display = 'block';
            errorDiv.style.display = 'none';

            try {
                const response = await fetch('/api/index/ask?question=' + encodeURIComponent(prompt));
                const data = await response.json();
                
                if (data.answer || data.response) {
                    resDiv.innerText = data.answer || data.response;
                } else {
                    throw new Error();
                }
            } catch (err) {
                errorDiv.style.display = 'block';
            } finally {
                loader.style.display = 'none';
                resDiv.style.opacity = '1';
            }
        }
    </script>
</body>
</html>
