<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حقي AI | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0b3d2c; --secondary: #d4af37; --bg: #f4f7f6; --text: #2c3e50; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Cairo', sans-serif; background: #e9ecef; margin: 0; display: flex; justify-content: center; height: 100vh; }

        /* محاكاة شاشة الهاتف للتطبيقات الاحترافية */
        .app-container { width: 100%; max-width: 480px; background: var(--bg); height: 100vh; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); overflow: hidden; }

        /* الهيدر الزجاجي */
        .top-bar { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.05); z-index: 10; }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-icon { background: var(--primary); color: var(--secondary); width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 4px 10px rgba(11, 61, 44, 0.2); }
        .top-bar h1 { margin: 0; font-size: 20px; font-weight: 800; color: var(--primary); }

        /* لوحة التحكم (البطاقات الفخمة) */
        #dashboard { flex: 1; overflow-y: auto; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding-bottom: 90px; }
        .card { background: #fff; border-radius: 20px; padding: 20px 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.02); border: 1px solid #f0f0f0; transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .card:active { transform: scale(0.96); }
        .card .icon-wrapper { width: 50px; height: 50px; border-radius: 15px; background: rgba(212, 175, 55, 0.1); color: var(--secondary); display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 15px; }
        .card h3 { margin: 0; font-size: 15px; font-weight: 800; color: var(--primary); }
        .card p { margin: 5px 0 0; font-size: 12px; color: #7f8c8d; }

        /* منطقة الدردشة المخصصة */
        #chat-view { display: none; flex: 1; flex-direction: column; background: #fff; height: 100%; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; background: #fafafa; padding-bottom: 20px;}

        /* تصميم الرسائل مع Avatars */
        .msg-row { display: flex; gap: 12px; max-width: 90%; animation: slideIn 0.3s ease; }
        .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg-row.ai { align-self: flex-start; }

        .avatar { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
        .avatar.ai-ava { background: var(--primary); color: var(--secondary); }
        .avatar.user-ava { background: var(--secondary); color: white; }

        .bubble { padding: 15px; font-size: 14px; line-height: 1.6; color: var(--text); position: relative; }
        .ai .bubble { background: #fff; border-radius: 0 18px 18px 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .user .bubble { background: var(--primary); color: white; border-radius: 18px 0 18px 18px; box-shadow: 0 4px 15px rgba(11, 61, 44, 0.2); }

        /* منطقة الإدخال الاحترافية */
        .input-area { background: #fff; padding: 15px 20px; display: flex; align-items: center; gap: 12px; border-top: 1px solid #eee; box-shadow: 0 -5px 20px rgba(0,0,0,0.02); }
        .media-btn { background: #f4f7f6; border: none; width: 40px; height: 40px; border-radius: 50%; color: var(--primary); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .media-btn:active { background: #e0e0e0; }
        .input-box { flex: 1; background: #f4f7f6; border: 1px solid #eee; border-radius: 20px; padding: 12px 15px; font-family: 'Cairo'; font-size: 14px; outline: none; transition: 0.3s; }
        .input-box:focus { border-color: var(--secondary); background: #fff; }
        .send-btn { background: var(--secondary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3); }

        /* شريط التنقل السفلي (Bottom Nav) */
        .bottom-nav { position: absolute; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 15px 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); border-top: 1px solid #f0f0f0; border-radius: 25px 25px 0 0; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #a0a0a0; font-size: 11px; cursor: pointer; gap: 5px; font-weight: 600; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 22px; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="app-container">

        <div class="top-bar">
            <div class="logo-area">
                <div class="logo-icon"><i class="fas fa-balance-scale-right"></i></div>
                <h1>حقي AI</h1>
            </div>
            <i class="fas fa-cog" style="color: #a0a0a0; font-size: 20px;"></i>
        </div>

        <div id="dashboard">
            <div class="card" onclick="openChat('الإقامة')">
                <div class="icon-wrapper"><i class="fas fa-id-card"></i></div>
                <h3>شؤون الإقامة</h3>
                <p>تجديد، تسوية، رفض</p>
            </div>
            <div class="card" onclick="openChat('الشغل')">
                <div class="icon-wrapper"><i class="fas fa-briefcase"></i></div>
                <h3>قانون الشغل</h3>
                <p>عقود، طرد، أجور</p>
            </div>
            <div class="card" onclick="openChat('السكن')">
                <div class="icon-wrapper"><i class="fas fa-home"></i></div>
                <h3>السكن والكراء</h3>
                <p>عقود، إفراغ، زيادة</p>
            </div>
            <div class="card" onclick="openChat('الجنسية')">
                <div class="icon-wrapper"><i class="fas fa-passport"></i></div>
                <h3>الجنسية</h3>
                <p>شروط، امتحانات</p>
            </div>
        </div>

        <div id="chat-view">
            <div id="messages">
                <div class="msg-row ai">
                    <div class="avatar ai-ava"><i class="fas fa-robot"></i></div>
                    <div class="bubble">مرحباً! تم تفعيل الوضع الاحترافي. أنا رهن إشارتك لتحليل أي موقف قانوني بالدارجة المغربية.</div>
                </div>
            </div>
            <div class="input-area">
                <button class="media-btn" id="cam-btn"><i class="fas fa-camera"></i></button>
                <button class="media-btn" id="mic-btn"><i class="fas fa-microphone"></i></button>
                <input type="text" id="userInput" class="input-box" placeholder="اكتب استشارتك هنا...">
                <button class="send-btn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>

        <div class="bottom-nav" id="bottom-nav">
            <div class="nav-item active" onclick="goHome()">
                <i class="fas fa-home"></i>
                <span>الرئيسية</span>
            </div>
            <div class="nav-item" onclick="alert('قسم الكاميرا: سيتم تفعيله لقراءة الوثائق')">
                <i class="fas fa-camera"></i>
                <span>مسح وثيقة</span>
            </div>
            <div class="nav-item" onclick="alert('حسابي: قريباً')">
                <i class="fas fa-user"></i>
                <span>حسابي</span>
            </div>
        </div>

    </div>

    <script>
        const dashboard = document.getElementById('dashboard');
        const chatView = document.getElementById('chat-view');
        const messages = document.getElementById('messages');
        const input = document.getElementById('userInput');
        const bottomNav = document.getElementById('bottom-nav');

        function openChat(topic) {
            dashboard.style.display = 'none';
            bottomNav.style.display = 'none';
            chatView.style.display = 'flex';

            // إضافة رسالة افتتاحية للمجال المختار
            messages.innerHTML += `
                <div class="msg-row ai">
                    <div class="avatar ai-ava"><i class="fas fa-gavel"></i></div>
                    <div class="bubble">اخترت قسم <strong>${topic}</strong>. تفضل بطرح سؤالك أو قم بتصوير الوثيقة.</div>
                </div>`;
        }

        function goHome() {
            chatView.style.display = 'none';
            dashboard.style.display = 'grid';
            bottomNav.style.display = 'flex';
        }

        async function sendMsg() {
            const text = input.value.trim();
            if(!text) return;

            // رسالة المستخدم
            messages.innerHTML += `
                <div class="msg-row user">
                    <div class="avatar user-ava"><i class="fas fa-user"></i></div>
                    <div class="bubble">${text}</div>
                </div>`;
            input.value = '';
            messages.scrollTop = messages.scrollHeight;

            try {
                const response = await fetch('/api/index/ask?question=' + encodeURIComponent(text));
                const data = await response.json();

                // رسالة الذكاء الاصطناعي
                messages.innerHTML += `
                    <div class="msg-row ai">
                        <div class="avatar ai-ava"><i class="fas fa-robot"></i></div>
                        <div class="bubble">${data.answer.replace(/\n/g, '<br>')}</div>
                    </div>`;
                messages.scrollTop = messages.scrollHeight;
            } catch (e) {
                alert("خطأ في الاتصال");
            }
        }

        // إعداد الميكروفون
        document.getElementById('mic-btn').onclick = () => {
            if ('webkitSpeechRecognition' in window) {
                const rec = new webkitSpeechRecognition();
                rec.lang = 'ar-MA';
                rec.start();
                rec.onresult = (e) => { input.value = e.results[0][0].transcript; sendMsg(); };
            } else { alert("متصفحك لا يدعم الميكروفون."); }
        };
    </script>
</body>
</html>
